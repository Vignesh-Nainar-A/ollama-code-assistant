name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Check chat.js syntax
        run: node --check media/chat.js

      - name: Run static analysis
        run: node test-static.js

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-code-assistant-vsix
          path: '*.vsix'
          retention-days: 30
